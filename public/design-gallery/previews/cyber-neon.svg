<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scanlines" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Dark Background -->
  <rect width="400" height="300" fill="#0a0a0f"/>

  <!-- Grid Pattern -->
  <g opacity="0.06" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>

  <!-- Header Bar -->
  <rect x="0" y="0" width="400" height="36" fill="#0a0a0f" opacity="0.95"/>
  <line x1="0" y1="36" x2="400" y2="36" stroke="#2a2a45" stroke-width="1"/>
  <text x="16" y="24" font-family="monospace" font-size="12" font-weight="700" fill="#00ff88" filter="url(#glow-green)">NEXUS_OS</text>
  <circle cx="372" cy="18" r="4" fill="#00ff88" filter="url(#glow-green)"/>

  <!-- Hero Text -->
  <text x="200" y="72" font-family="sans-serif" font-size="9" fill="#00ccff" text-anchor="middle" letter-spacing="3" opacity="0.7">// SYSTEM INTERFACE</text>
  <text x="200" y="95" font-family="sans-serif" font-size="18" font-weight="700" fill="#00ff88" text-anchor="middle" filter="url(#glow-green)" letter-spacing="2">COMMAND CENTER</text>

  <!-- Stat Cards -->
  <!-- Card 1 - Green -->
  <g>
    <polygon points="20,120 178,120 186,128 186,185 28,185 20,177" fill="#1a1a2f" stroke="#2a2a45" stroke-width="1"/>
    <line x1="20" y1="121" x2="186" y2="121" stroke="#00ff88" stroke-width="2" filter="url(#glow-green)"/>
    <text x="32" y="140" font-family="monospace" font-size="8" fill="#8888aa" letter-spacing="1">ACTIVE NODES</text>
    <text x="32" y="168" font-family="monospace" font-size="24" font-weight="700" fill="#00ff88" filter="url(#glow-green)">2,847</text>
  </g>

  <!-- Card 2 - Pink -->
  <g>
    <polygon points="214,120 372,120 380,128 380,185 222,185 214,177" fill="#1a1a2f" stroke="#2a2a45" stroke-width="1"/>
    <line x1="214" y1="121" x2="380" y2="121" stroke="#ff0066" stroke-width="2" filter="url(#glow-pink)"/>
    <text x="226" y="140" font-family="monospace" font-size="8" fill="#8888aa" letter-spacing="1">THREAT LEVEL</text>
    <text x="226" y="168" font-family="monospace" font-size="24" font-weight="700" fill="#ff0066" filter="url(#glow-pink)">LOW</text>
  </g>

  <!-- Progress Bars -->
  <rect x="20" y="198" width="360" height="4" fill="#2a2a45" rx="2"/>
  <rect x="20" y="198" width="262" height="4" fill="#00ff88" rx="2" filter="url(#glow-green)"/>

  <rect x="20" y="212" width="360" height="4" fill="#2a2a45" rx="2"/>
  <rect x="20" y="212" width="320" height="4" fill="#ff0066" rx="2" filter="url(#glow-pink)"/>

  <rect x="20" y="226" width="360" height="4" fill="#2a2a45" rx="2"/>
  <rect x="20" y="226" width="162" height="4" fill="#00ccff" rx="2" filter="url(#glow-cyan)"/>

  <!-- Data Grid Row -->
  <rect x="20" y="244" width="360" height="20" fill="#1a1a2f"/>
  <line x1="20" y1="264" x2="380" y2="264" stroke="#2a2a45" stroke-width="0.5"/>
  <text x="32" y="258" font-family="monospace" font-size="8" fill="#00ff88">NX-4721</text>
  <text x="120" y="258" font-family="monospace" font-size="8" fill="#8888aa">Tokyo, JP</text>
  <text x="220" y="258" font-family="monospace" font-size="8" fill="#00ff88">Active</text>
  <text x="300" y="258" font-family="monospace" font-size="8" fill="#8888aa">12ms</text>

  <rect x="20" y="266" width="360" height="20" fill="rgba(26,26,47,0.5)"/>
  <line x1="20" y1="286" x2="380" y2="286" stroke="#2a2a45" stroke-width="0.5"/>
  <text x="32" y="280" font-family="monospace" font-size="8" fill="#ff0066">NX-2210</text>
  <text x="120" y="280" font-family="monospace" font-size="8" fill="#8888aa">Mumbai, IN</text>
  <text x="220" y="280" font-family="monospace" font-size="8" fill="#ff0066">Offline</text>
  <text x="300" y="280" font-family="monospace" font-size="8" fill="#555570">---</text>

  <!-- Neon divider line -->
  <line x1="0" y1="108" x2="400" y2="108" stroke="#00ff88" stroke-width="0.5" opacity="0.3" filter="url(#glow-green)"/>

  <!-- Scanline overlay -->
  <rect width="400" height="300" fill="url(#scanlines)" opacity="0.15" style="background-size: 100% 4px;"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="399" height="299" fill="none" stroke="#2a2a45" stroke-width="1" rx="2"/>
</svg>
