<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="pink-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <filter id="glass-blur">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gradient Background -->
  <rect width="400" height="300" fill="url(#bg-grad)"/>

  <!-- Floating circles -->
  <circle cx="340" cy="60" r="80" fill="#f093fb" opacity="0.15"/>
  <circle cx="60" cy="250" r="100" fill="#00f2fe" opacity="0.1"/>
  <circle cx="250" cy="220" r="50" fill="#ffffff" opacity="0.05"/>

  <!-- Glass Nav Bar -->
  <rect x="20" y="12" width="360" height="36" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <text x="36" y="35" font-family="sans-serif" font-size="13" font-weight="700" fill="white">Prism</text>
  <text x="180" y="34" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Home</text>
  <text x="220" y="34" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Features</text>
  <text x="272" y="34" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Pricing</text>
  <rect x="320" y="20" width="48" height="20" rx="10" fill="white" opacity="0.9"/>
  <text x="328" y="34" font-family="sans-serif" font-size="9" font-weight="600" fill="#667eea">Sign Up</text>

  <!-- Hero text -->
  <text x="200" y="85" font-family="sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Build Beautiful</text>
  <text x="200" y="105" font-family="sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Interfaces</text>
  <rect x="110" y="114" rx="3" width="180" height="7" fill="rgba(255,255,255,0.3)"/>

  <!-- Hero buttons -->
  <rect x="130" y="130" width="70" height="22" rx="11" fill="white"/>
  <text x="146" y="145" font-family="sans-serif" font-size="8" font-weight="600" fill="#667eea">Get Started</text>
  <rect x="208" y="130" width="60" height="22" rx="11" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <text x="219" y="145" font-family="sans-serif" font-size="8" fill="white">Demo</text>

  <!-- Glass Cards Row -->
  <g>
    <!-- Card 1 -->
    <rect x="20" y="168" width="112" height="80" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
    <rect x="32" y="180" width="24" height="24" rx="6" fill="rgba(255,255,255,0.25)"/>
    <text x="39" y="198" font-size="12">&#9889;</text>
    <rect x="32" y="212" rx="2" width="70" height="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="32" y="222" rx="2" width="85" height="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="32" y="231" rx="2" width="55" height="5" fill="rgba(255,255,255,0.15)"/>

    <!-- Card 2 -->
    <rect x="144" y="168" width="112" height="80" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
    <rect x="156" y="180" width="24" height="24" rx="6" fill="rgba(255,255,255,0.25)"/>
    <text x="163" y="198" font-size="12">&#127912;</text>
    <rect x="156" y="212" rx="2" width="70" height="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="156" y="222" rx="2" width="85" height="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="156" y="231" rx="2" width="55" height="5" fill="rgba(255,255,255,0.15)"/>

    <!-- Card 3 -->
    <rect x="268" y="168" width="112" height="80" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
    <rect x="280" y="180" width="24" height="24" rx="6" fill="rgba(255,255,255,0.25)"/>
    <text x="287" y="198" font-size="12">&#128241;</text>
    <rect x="280" y="212" rx="2" width="70" height="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="280" y="222" rx="2" width="85" height="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="280" y="231" rx="2" width="55" height="5" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Badge pills at bottom -->
  <rect x="20" y="264" width="55" height="18" rx="9" fill="rgba(72,255,167,0.2)" stroke="rgba(72,255,167,0.3)" stroke-width="0.5"/>
  <text x="33" y="277" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.9)">Active</text>
  <rect x="82" y="264" width="55" height="18" rx="9" fill="rgba(255,200,55,0.2)" stroke="rgba(255,200,55,0.3)" stroke-width="0.5"/>
  <text x="93" y="277" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.9)">Pending</text>
  <rect x="144" y="264" width="55" height="18" rx="9" fill="rgba(255,90,120,0.2)" stroke="rgba(255,90,120,0.3)" stroke-width="0.5"/>
  <text x="157" y="277" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.9)">Urgent</text>

  <!-- FAB -->
  <circle cx="366" cy="268" r="16" fill="url(#pink-grad)"/>
  <text x="360" y="274" font-family="sans-serif" font-size="18" font-weight="300" fill="white">+</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="399" height="299" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" rx="6"/>
</svg>
