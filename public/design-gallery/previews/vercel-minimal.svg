<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <!-- Background -->
  <rect width="400" height="300" fill="#000000"/>

  <!-- Nav Bar -->
  <line x1="0" y1="32" x2="400" y2="32" stroke="#333333" stroke-width="0.5"/>
  <!-- Triangle Logo -->
  <polygon points="20,22 30,8 40,22" fill="#ffffff"/>
  <rect x="46" y="13" width="36" height="7" rx="2" fill="#ffffff"/>
  <rect x="140" y="14" width="24" height="5" rx="1.5" fill="#888888"/>
  <rect x="172" y="14" width="24" height="5" rx="1.5" fill="#888888"/>
  <rect x="204" y="14" width="24" height="5" rx="1.5" fill="#888888"/>
  <rect x="310" y="9" width="34" height="14" rx="4" fill="transparent" stroke="#333333" stroke-width="0.8"/>
  <rect x="350" y="9" width="34" height="14" rx="4" fill="#ffffff"/>
  <rect x="355" y="13" width="24" height="6" rx="1.5" fill="#000000"/>

  <!-- Hero Section -->
  <text x="200" y="72" text-anchor="middle" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-2">Develop.</text>
  <text x="200" y="104" text-anchor="middle" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-2">Preview.</text>
  <text x="200" y="136" text-anchor="middle" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-2">Ship.</text>

  <rect x="115" y="150" width="170" height="5" rx="1.5" fill="#888888"/>
  <rect x="130" y="160" width="140" height="5" rx="1.5" fill="#888888"/>

  <!-- CTA Buttons -->
  <rect x="130" y="176" width="70" height="18" rx="5" fill="#ffffff"/>
  <rect x="140" y="181" width="50" height="8" rx="2" fill="#000000"/>
  <rect x="210" y="176" width="60" height="18" rx="5" fill="transparent" stroke="#333333" stroke-width="1"/>

  <!-- Code Block -->
  <rect x="100" y="206" width="200" height="14" rx="5" fill="#111111" stroke="#333333" stroke-width="0.5"/>
  <rect x="108" y="210" width="6" height="5" rx="1" fill="#666666"/>
  <rect x="118" y="210" width="100" height="5" rx="1" fill="#ffffff"/>

  <!-- Feature Grid -->
  <rect x="20" y="234" width="110" height="50" rx="6" fill="#000000" stroke="#333333" stroke-width="0.5"/>
  <rect x="145" y="234" width="110" height="50" rx="6" fill="#000000" stroke="#333333" stroke-width="0.5"/>
  <rect x="270" y="234" width="110" height="50" rx="6" fill="#000000" stroke="#333333" stroke-width="0.5"/>

  <!-- Card Content -->
  <rect x="30" y="244" width="12" height="12" rx="2" fill="#111111"/>
  <rect x="30" y="260" width="50" height="5" rx="1.5" fill="#ffffff"/>
  <rect x="30" y="269" width="80" height="4" rx="1" fill="#888888"/>

  <rect x="155" y="244" width="12" height="12" rx="2" fill="#111111"/>
  <rect x="155" y="260" width="50" height="5" rx="1.5" fill="#ffffff"/>
  <rect x="155" y="269" width="80" height="4" rx="1" fill="#888888"/>

  <rect x="280" y="244" width="12" height="12" rx="2" fill="#111111"/>
  <rect x="280" y="260" width="50" height="5" rx="1.5" fill="#ffffff"/>
  <rect x="280" y="269" width="80" height="4" rx="1" fill="#888888"/>

  <!-- Link Accents -->
  <rect x="30" y="276" width="40" height="3" rx="1" fill="#0070f3"/>
  <rect x="155" y="276" width="40" height="3" rx="1" fill="#0070f3"/>
  <rect x="280" y="276" width="40" height="3" rx="1" fill="#0070f3"/>

  <!-- Separator -->
  <line x1="40" y1="230" x2="180" y2="230" stroke="#333333" stroke-width="0.5"/>
  <rect x="188" y="228" width="4" height="4" rx="0" fill="#333333" transform="rotate(45 190 230)"/>
  <line x1="200" y1="230" x2="360" y2="230" stroke="#333333" stroke-width="0.5"/>

  <!-- Label -->
  <text x="200" y="296" text-anchor="middle" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="8" fill="#666666">Vercel Minimal</text>
</svg>
