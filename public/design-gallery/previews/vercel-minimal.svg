  <rect x="34" y="12" width="40" height="7" rx="2" fill="#000000"/>
  <!-- Nav links -->
  <rect x="130" y="13" width="26" height="5" rx="1.5" fill="#666666"/>
  <rect x="164" y="13" width="18" height="5" rx="1.5" fill="#666666"/>
  <rect x="190" y="13" width="30" height="5" rx="1.5" fill="#666666"/>
  <rect x="228" y="13" width="34" height="5" rx="1.5" fill="#666666"/>
