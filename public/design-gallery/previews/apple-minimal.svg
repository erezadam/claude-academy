<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="apple-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#ffffff"/>

  <!-- Nav Bar -->
  <rect width="400" height="28" fill="#ffffff" opacity="0.95"/>
  <rect x="20" y="10" width="40" height="8" rx="2" fill="#1d1d1f"/>
  <rect x="160" y="11" width="24" height="6" rx="2" fill="#6e6e73"/>
  <rect x="192" y="11" width="24" height="6" rx="2" fill="#6e6e73"/>
  <rect x="224" y="11" width="24" height="6" rx="2" fill="#6e6e73"/>
  <rect x="320" y="7" width="60" height="14" rx="7" fill="#0071e3"/>
  <rect x="332" y="10" width="36" height="8" rx="2" fill="#ffffff"/>
  <line x1="0" y1="28" x2="400" y2="28" stroke="#d2d2d7" stroke-width="0.5"/>

  <!-- Hero Section -->
  <rect x="100" y="38" width="200" height="6" rx="2" fill="#0071e3" opacity="0.6"/>
  <rect x="60" y="52" width="280" height="14" rx="3" fill="#1d1d1f"/>
  <rect x="80" y="72" width="240" height="14" rx="3" fill="#1d1d1f"/>
  <rect x="100" y="96" width="200" height="6" rx="2" fill="#6e6e73"/>
  <rect x="120" y="108" width="160" height="6" rx="2" fill="#6e6e73"/>

  <!-- CTA Buttons -->
  <rect x="120" y="122" width="80" height="18" rx="9" fill="#0071e3"/>
  <rect x="210" y="122" width="70" height="18" rx="9" fill="none" stroke="#0071e3" stroke-width="1"/>

  <!-- Hero Image Placeholder -->
  <rect x="60" y="150" width="280" height="60" rx="12" fill="url(#apple-grad)" filter="url(#apple-shadow)"/>
  <defs>
    <linearGradient id="apple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Feature Cards -->
  <rect x="20" y="225" width="110" height="60" rx="10" fill="#f5f5f7"/>
  <rect x="145" y="225" width="110" height="60" rx="10" fill="#f5f5f7"/>
  <rect x="270" y="225" width="110" height="60" rx="10" fill="#f5f5f7"/>

  <!-- Card Icons -->
  <circle cx="50" cy="245" r="10" fill="rgba(0,113,227,0.1)"/>
  <circle cx="50" cy="245" r="4" fill="#0071e3"/>
  <circle cx="175" cy="245" r="10" fill="rgba(52,199,89,0.1)"/>
  <circle cx="175" cy="245" r="4" fill="#34c759"/>
  <circle cx="300" cy="245" r="10" fill="rgba(175,82,222,0.1)"/>
  <circle cx="300" cy="245" r="4" fill="#af52de"/>

  <!-- Card Text Lines -->
  <rect x="35" y="260" width="60" height="5" rx="1.5" fill="#1d1d1f"/>
  <rect x="30" y="270" width="80" height="4" rx="1.5" fill="#6e6e73"/>
  <rect x="160" y="260" width="60" height="5" rx="1.5" fill="#1d1d1f"/>
  <rect x="155" y="270" width="80" height="4" rx="1.5" fill="#6e6e73"/>
  <rect x="285" y="260" width="60" height="5" rx="1.5" fill="#1d1d1f"/>
  <rect x="280" y="270" width="80" height="4" rx="1.5" fill="#6e6e73"/>

  <!-- Label -->
  <text x="200" y="296" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="8" fill="#6e6e73">Apple Minimal</text>
</svg>
