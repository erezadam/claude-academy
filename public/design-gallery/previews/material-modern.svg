<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="card-grad-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E8FD"/>
      <stop offset="100%" stop-color="#E0F7F5"/>
    </linearGradient>
    <linearGradient id="card-grad-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F7F5"/>
      <stop offset="100%" stop-color="#E8F0FE"/>
    </linearGradient>
    <linearGradient id="card-grad-3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F3E8FD"/>
    </linearGradient>
    <filter id="mm-shadow-1">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
    <filter id="mm-shadow-2">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F8F9FA"/>

  <!-- App Bar -->
  <rect x="0" y="0" width="400" height="40" fill="#FFFFFF" filter="url(#mm-shadow-1)"/>
  <rect x="14" y="10" width="20" height="20" rx="6" fill="#6200EE"/>
  <text x="19" y="25" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="white">T</text>
  <text x="40" y="26" font-family="-apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F">TaskFlow</text>
  <rect x="170" y="12" width="44" height="18" rx="9" fill="#F3E8FD"/>
  <text x="180" y="24" font-family="-apple-system, sans-serif" font-size="8" fill="#6200EE" font-weight="500">Tasks</text>
  <text x="226" y="24" font-family="-apple-system, sans-serif" font-size="8" fill="#49454F">Projects</text>
  <text x="280" y="24" font-family="-apple-system, sans-serif" font-size="8" fill="#49454F">Calendar</text>
  <rect x="340" y="11" width="48" height="18" rx="9" fill="#F3E8FD"/>
  <text x="349" y="23" font-family="-apple-system, sans-serif" font-size="7" fill="#6200EE" font-weight="500">Sign In</text>

  <!-- Hero Area -->
  <rect x="0" y="40" width="400" height="70" fill="#FFFFFF" filter="url(#mm-shadow-1)"/>
  <text x="12" y="56" font-family="-apple-system, sans-serif" font-size="7" font-weight="500" fill="#6200EE" letter-spacing="0.5">TASK MANAGEMENT</text>
  <text x="200" y="80" font-family="-apple-system, sans-serif" font-size="16" font-weight="400" fill="#1C1B1F" text-anchor="middle">Stay organized, ship with confidence</text>
  <rect x="80" y="90" rx="2" width="240" height="5" fill="#CAC4D0" opacity="0.5"/>
  <!-- Hero buttons -->
  <rect x="108" y="97" width="60" height="18" rx="9" fill="#6200EE"/>
  <text x="115" y="109" font-family="-apple-system, sans-serif" font-size="7" font-weight="500" fill="white">Create Project</text>
  <rect x="174" y="97" width="60" height="18" rx="9" fill="#F3E8FD"/>
  <text x="179" y="109" font-family="-apple-system, sans-serif" font-size="7" font-weight="500" fill="#6200EE">Templates</text>
  <rect x="240" y="97" width="56" height="18" rx="9" fill="none" stroke="#CAC4D0" stroke-width="0.8"/>
  <text x="248" y="109" font-family="-apple-system, sans-serif" font-size="7" font-weight="500" fill="#6200EE">Learn More</text>

  <!-- Chips Row -->
  <rect x="12" y="122" width="40" height="14" rx="4" fill="#F3E8FD"/>
  <text x="20" y="132" font-family="-apple-system, sans-serif" font-size="7" fill="#6200EE" font-weight="500">All Tasks</text>
  <rect x="56" y="122" width="38" height="14" rx="4" fill="none" stroke="#CAC4D0" stroke-width="0.6"/>
  <text x="75" y="132" font-family="-apple-system, sans-serif" font-size="7" fill="#49454F" text-anchor="middle">Design</text>
  <rect x="98" y="122" width="55" height="14" rx="4" fill="none" stroke="#CAC4D0" stroke-width="0.6"/>
  <text x="125" y="132" font-family="-apple-system, sans-serif" font-size="7" fill="#49454F" text-anchor="middle">Engineering</text>
  <rect x="157" y="122" width="40" height="14" rx="4" fill="none" stroke="#CAC4D0" stroke-width="0.6"/>
  <text x="177" y="132" font-family="-apple-system, sans-serif" font-size="7" fill="#49454F" text-anchor="middle">Product</text>

  <!-- 3 Task Cards -->
  <g filter="url(#mm-shadow-2)">
    <!-- Card 1 -->
    <rect x="12" y="148" width="120" height="110" rx="12" fill="#FFFFFF"/>
    <rect x="12" y="148" width="120" height="48" rx="12" fill="url(#card-grad-1)"/>
    <rect x="12" y="188" width="120" height="8" rx="0" fill="#FFFFFF"/>
    <text x="70" y="178" font-size="20" text-anchor="middle">&#127912;</text>
    <rect x="22" y="204" rx="2" width="80" height="6" fill="#1C1B1F" opacity="0.15"/>
    <rect x="22" y="214" rx="2" width="100" height="4" fill="#CAC4D0" opacity="0.5"/>
    <rect x="22" y="222" rx="2" width="70" height="4" fill="#CAC4D0" opacity="0.5"/>
    <rect x="22" y="237" width="48" height="14" rx="7" fill="#6200EE"/>
    <text x="31" y="247" font-family="-apple-system, sans-serif" font-size="7" fill="white" font-weight="500">View Task</text>
  </g>

  <g filter="url(#mm-shadow-2)">
    <!-- Card 2 -->
    <rect x="140" y="148" width="120" height="110" rx="12" fill="#FFFFFF"/>
    <rect x="140" y="148" width="120" height="48" rx="12" fill="url(#card-grad-2)"/>
    <rect x="140" y="188" width="120" height="8" rx="0" fill="#FFFFFF"/>
    <text x="198" y="178" font-size="20" text-anchor="middle">&#128187;</text>
    <rect x="150" y="204" rx="2" width="80" height="6" fill="#1C1B1F" opacity="0.15"/>
    <rect x="150" y="214" rx="2" width="100" height="4" fill="#CAC4D0" opacity="0.5"/>
    <rect x="150" y="222" rx="2" width="70" height="4" fill="#CAC4D0" opacity="0.5"/>
    <rect x="150" y="237" width="48" height="14" rx="7" fill="#6200EE"/>
    <text x="159" y="247" font-family="-apple-system, sans-serif" font-size="7" fill="white" font-weight="500">View Task</text>
  </g>

  <!-- Text Field Preview -->
  <rect x="278" y="148" width="108" height="36" rx="4" fill="none" stroke="#79747E" stroke-width="0.8"/>
  <text x="288" y="139" font-family="-apple-system, sans-serif" font-size="7" fill="#6200EE" font-weight="500">Task Name</text>
  <text x="288" y="170" font-family="-apple-system, sans-serif" font-size="9" fill="#1C1B1F">Design Workshop</text>

  <rect x="278" y="196" width="108" height="36" rx="4" fill="none" stroke="#79747E" stroke-width="0.8"/>
  <text x="288" y="187" font-family="-apple-system, sans-serif" font-size="7" fill="#79747E">Due Date</text>
  <rect x="288" y="210" rx="1" width="60" height="5" fill="#CAC4D0" opacity="0.4"/>

  <rect x="278" y="243" width="108" height="18" rx="9" fill="#6200EE"/>
  <text x="332" y="256" font-family="-apple-system, sans-serif" font-size="8" fill="white" font-weight="500" text-anchor="middle">Create Task</text>

  <!-- List item at bottom -->
  <circle cx="26" cy="281" r="10" fill="#F3E8FD"/>
  <text x="22" y="285" font-size="10">&#128100;</text>
  <text x="42" y="280" font-family="-apple-system, sans-serif" font-size="8" fill="#1C1B1F">Profile Settings</text>
  <text x="42" y="290" font-family="-apple-system, sans-serif" font-size="6" fill="#79747E">Edit your profile info</text>

  <!-- FAB -->
  <rect x="336" y="268" width="54" height="24" rx="8" fill="#F3E8FD" filter="url(#mm-shadow-2)"/>
  <text x="346" y="284" font-family="-apple-system, sans-serif" font-size="12" fill="#6200EE">+</text>
  <text x="358" y="284" font-family="-apple-system, sans-serif" font-size="8" fill="#6200EE" font-weight="500">Task</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="399" height="299" fill="none" stroke="#CAC4D0" stroke-width="0.5" rx="4"/>
</svg>
