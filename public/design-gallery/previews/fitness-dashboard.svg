<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <clipPath id="fit-clip"><rect width="400" height="300" rx="8"/></clipPath>
    <linearGradient id="fit-bar-g" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="fit-bar-glow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#fit-clip)">
    <!-- Background -->
    <rect width="400" height="300" fill="#111827"/>

    <!-- Header -->
    <rect width="400" height="46" fill="#111827"/>
    <line x1="0" y1="46" x2="400" y2="46" stroke="#374151" stroke-width="0.5"/>
    <!-- Avatar -->
    <circle cx="28" cy="23" r="16" fill="#F97316"/>
    <text x="28" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="800">M</text>
    <circle cx="40" cy="35" r="4" fill="#22C55E" stroke="#111827" stroke-width="1.5"/>
    <!-- Name -->
    <text x="50" y="20" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#F9FAFB" font-weight="700">Marcus Rivera</text>
    <rect x="50" y="26" width="58" height="12" rx="6" fill="rgba(249,115,22,0.15)"/>
    <text x="79" y="35" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#F97316" font-weight="700" text-anchor="middle">24-day streak</text>
    <!-- Buttons -->
    <rect x="310" y="12" width="76" height="22" rx="6" fill="#F97316"/>
    <text x="348" y="27" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#fff" font-weight="600" text-anchor="middle">+ Log Workout</text>

    <!-- Stat Cards -->
    <!-- Calories -->
    <rect x="10" y="56" width="91" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <rect x="10" y="56" width="91" height="2.5" rx="1" fill="#F97316"/>
    <text x="18" y="72" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" font-weight="600" letter-spacing="0.5">CALORIES</text>
    <text x="18" y="92" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#F97316" font-weight="800">2,847</text>
    <text x="74" y="92" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#F97316" font-weight="600" opacity="0.6">kcal</text>
    <text x="18" y="103" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#22C55E" font-weight="700">+340 above goal</text>

    <!-- Workouts -->
    <rect x="107" y="56" width="91" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <rect x="107" y="56" width="91" height="2.5" rx="1" fill="#3B82F6"/>
    <text x="115" y="72" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" font-weight="600" letter-spacing="0.5">WORKOUTS</text>
    <text x="115" y="92" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#3B82F6" font-weight="800">24</text>
    <text x="115" y="103" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#22C55E" font-weight="700">+6 vs last month</text>

    <!-- Duration -->
    <rect x="204" y="56" width="91" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <rect x="204" y="56" width="91" height="2.5" rx="1" fill="#A855F7"/>
    <text x="212" y="72" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" font-weight="600" letter-spacing="0.5">DURATION</text>
    <text x="212" y="92" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#A855F7" font-weight="800">18.5</text>
    <text x="260" y="92" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#A855F7" font-weight="600" opacity="0.6">h</text>
    <text x="212" y="103" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#22C55E" font-weight="700">+2.3h vs last month</text>

    <!-- PRs -->
    <rect x="301" y="56" width="89" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <rect x="301" y="56" width="89" height="2.5" rx="1" fill="#22C55E"/>
    <text x="309" y="72" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" font-weight="600" letter-spacing="0.5">PRs</text>
    <text x="309" y="92" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#22C55E" font-weight="800">7</text>
    <text x="309" y="103" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#22C55E" font-weight="700">+3 new this month</text>

    <!-- Progress Rings -->
    <!-- Protein Ring -->
    <rect x="10" y="118" width="122" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <circle cx="48" cy="154" r="22" fill="none" stroke="#374151" stroke-width="4"/>
    <circle cx="48" cy="154" r="22" fill="none" stroke="#F97316" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="138.23" stroke-dashoffset="34.56" transform="rotate(-90 48 154)"/>
    <text x="48" y="156" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#F97316" font-weight="800" text-anchor="middle">75%</text>
    <text x="48" y="164" font-family="Inter,system-ui,sans-serif" font-size="5" fill="#6B7280" text-anchor="middle">of goal</text>
    <text x="96" y="150" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#F9FAFB" font-weight="700" text-anchor="middle">Protein</text>
    <text x="96" y="162" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#9CA3AF" text-anchor="middle">142g / 190g</text>

    <!-- Hydration Ring -->
    <rect x="139" y="118" width="122" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <circle cx="177" cy="154" r="22" fill="none" stroke="#374151" stroke-width="4"/>
    <circle cx="177" cy="154" r="22" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"
