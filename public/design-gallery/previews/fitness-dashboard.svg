    <text x="177" y="156" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#3B82F6" font-weight="800" text-anchor="middle">65%</text>
    <text x="177" y="164" font-family="Inter,system-ui,sans-serif" font-size="5" fill="#6B7280" text-anchor="middle">of goal</text>
    <text x="225" y="150" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#F9FAFB" font-weight="700" text-anchor="middle">Hydration</text>
    <text x="225" y="162" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#9CA3AF" text-anchor="middle">2.1L / 3.2L</text>

    <!-- Recovery Ring -->
    <rect x="268" y="118" width="122" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <circle cx="306" cy="154" r="22" fill="none" stroke="#374151" stroke-width="4"/>
    <circle cx="306" cy="154" r="22" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="138.23" stroke-dashoffset="20.73" transform="rotate(-90 306 154)"/>
    <text x="306" y="156" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#22C55E" font-weight="800" text-anchor="middle">85%</text>
    <text x="306" y="164" font-family="Inter,system-ui,sans-serif" font-size="5" fill="#6B7280" text-anchor="middle">score</text>
    <text x="354" y="150" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#F9FAFB" font-weight="700" text-anchor="middle">Recovery</text>
    <text x="354" y="162" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#9CA3AF" text-anchor="middle">7.2h sleep</text>

    <!-- Weekly Activity Chart -->
    <rect x="10" y="208" width="236" height="84" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <text x="20" y="224" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#F9FAFB" font-weight="700">Weekly Activity</text>
    <!-- Bars -->
    <rect x="24" y="248" width="20" height="28" rx="4" fill="url(#fit-bar-g)"/>
    <text x="34" y="284" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" text-anchor="middle" font-weight="600">Mon</text>

    <rect x="52" y="238" width="20" height="38" rx="4" fill="url(#fit-bar-g)"/>
    <text x="62" y="284" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" text-anchor="middle" font-weight="600">Tue</text>

    <rect x="80" y="256" width="20" height="20" rx="4" fill="url(#fit-bar-g)"/>
    <text x="90" y="284" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" text-anchor="middle" font-weight="600">Wed</text>

    <rect x="108" y="234" width="20" height="42" rx="4" fill="url(#fit-bar-g)"/>
    <text x="118" y="284" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" text-anchor="middle" font-weight="600">Thu</text>

    <rect x="136" y="264" width="20" height="12" rx="4" fill="#374151" opacity="0.5"/>
    <text x="146" y="284" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" text-anchor="middle" font-weight="600">Fri</text>

    <rect x="164" y="242" width="20" height="34" rx="4" fill="url(#fit-bar-g)"/>
    <text x="174" y="284" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#6B7280" text-anchor="middle" font-weight="600">Sat</text>

    <rect x="192" y="246" width="20" height="30" rx="4" fill="url(#fit-bar-glow)"/>
    <rect x="192" y="246" width="20" height="30" rx="4" fill="url(#fit-bar-glow)" opacity="0.3" filter="blur(3)"/>
    <text x="202" y="284" font-family="Inter,system-ui,sans-serif" font-size="5.5" fill="#F97316" text-anchor="middle" font-weight="600">Sun</text>

    <!-- Activity Feed -->
    <rect x="254" y="208" width="136" height="84" rx="8" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
    <text x="264" y="224" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#F9FAFB" font-weight="700">Activity Feed</text>
    <!-- Items -->
    <circle cx="270" cy="240" r="5" fill="rgba(249,115,22,0.15)"/>
    <text x="280" y="238" font-family="Inter,system-ui,sans-serif" font-size="6" fill="#F9FAFB" font-weight="600">Upper Body</text>
    <text x="280" y="246" font-family="Inter,system-ui,sans-serif" font-size="5" fill="#6B7280">Today, 52 min</text>
    <text x="378" y="242" font-family="Inter,system-ui,sans-serif" font-size="6" fill="#F9FAFB" font-weight="700" text-anchor="end">486 kcal</text>

    <circle cx="270" cy="258" r="5" fill="rgba(59,130,246,0.15)"/>
    <text x="280" y="256" font-family="Inter,system-ui,sans-serif" font-size="6" fill="#F9FAFB" font-weight="600">HIIT Cardio</text>
    <text x="280" y="264" font-family="Inter,system-ui,sans-serif" font-size="5" fill="#6B7280">Yesterday, 35 min</text>
    <text x="378" y="260" font-family="Inter,system-ui,sans-serif" font-size="6" fill="#F9FAFB" font-weight="700" text-anchor="end">412 kcal</text>

    <circle cx="270" cy="276" r="5" fill="rgba(168,85,247,0.15)"/>
    <text x="280" y="274" font-family="Inter,system-ui,sans-serif" font-size="6" fill="#F9FAFB" font-weight="600">5K Run</text>
    <text x="280" y="282" font-family="Inter,system-ui,sans-serif" font-size="5" fill="#6B7280">Mar 9, 28 min</text>
    <text x="378" y="278" font-family="Inter,system-ui,sans-serif" font-size="6" fill="#F9FAFB" font-weight="700" text-anchor="end">320 kcal</text>
  </g>
</svg>
