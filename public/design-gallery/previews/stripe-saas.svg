<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="stripe-hero-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="50%" stop-color="#1a1f71"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="stripe-accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#635bff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <filter id="stripe-glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="stripe-card-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#stripe-hero-grad)"/>

  <!-- Grid Pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="300"/><line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
  </g>

  <!-- Glow Orbs -->
  <circle cx="320" cy="40" r="80" fill="#635bff" opacity="0.12" filter="url(#stripe-glow)"/>
  <circle cx="80" cy="200" r="60" fill="#00d4aa" opacity="0.08" filter="url(#stripe-glow)"/>

  <!-- Nav Bar -->
  <rect x="20" y="10" width="50" height="8" rx="2" fill="#ffffff"/>
  <rect x="150" y="11" width="24" height="6" rx="2" fill="#adbdcc"/>
  <rect x="182" y="11" width="24" height="6" rx="2" fill="#adbdcc"/>
  <rect x="320" y="7" width="60" height="14" rx="7" fill="#635bff"/>

  <!-- Hero Text -->
  <rect x="80" y="44" width="240" height="12" rx="2" fill="#ffffff"/>
  <rect x="100" y="62" width="200" height="12" rx="2" fill="url(#stripe-accent-grad)"/>
  <rect x="120" y="84" width="160" height="5" rx="2" fill="#adbdcc"/>
  <rect x="130" y="94" width="140" height="5" rx="2" fill="#adbdcc"/>

  <!-- CTA Buttons -->
  <rect x="120" y="108" width="80" height="18" rx="9" fill="#635bff"/>
  <rect x="210" y="108" width="70" height="18" rx="9" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- White Cards on Dark -->
  <rect x="20" y="145" width="110" height="130" rx="10" fill="#ffffff" filter="url(#stripe-card-shadow)"/>
  <rect x="145" y="140" width="110" height="140" rx="10" fill="#ffffff" filter="url(#stripe-card-shadow)"/>
  <rect x="270" y="145" width="110" height="130" rx="10" fill="#ffffff" filter="url(#stripe-card-shadow)"/>

  <!-- Featured Card Border -->
  <rect x="144" y="139" width="112" height="142" rx="10" fill="none" stroke="#635bff" stroke-width="2"/>
  <rect x="170" y="134" width="60" height="12" rx="6" fill="#635bff"/>
  <text x="200" y="142" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#ffffff">Popular</text>

  <!-- Card Content -->
  <rect x="35" y="160" width="50" height="5" rx="1.5" fill="#0a2540"/>
  <rect x="35" y="172" width="70" height="12" rx="2" fill="#0a2540"/>
  <rect x="35" y="192" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="35" y="200" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="35" y="208" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="35" y="250" width="80" height="14" rx="7" fill="#f5f5f7"/>

  <rect x="160" y="157" width="50" height="5" rx="1.5" fill="#0a2540"/>
  <rect x="160" y="169" width="70" height="12" rx="2" fill="#0a2540"/>
  <rect x="160" y="189" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="160" y="197" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="160" y="205" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="160" y="250" width="80" height="14" rx="7" fill="#635bff"/>

  <rect x="285" y="160" width="50" height="5" rx="1.5" fill="#0a2540"/>
  <rect x="285" y="172" width="70" height="12" rx="2" fill="#0a2540"/>
  <rect x="285" y="192" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="285" y="200" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="285" y="208" width="80" height="3" rx="1" fill="#e6e9ec"/>
  <rect x="285" y="250" width="80" height="14" rx="7" fill="#f5f5f7"/>

  <!-- Label -->
  <text x="200" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#adbdcc">Stripe SaaS</text>
</svg>
