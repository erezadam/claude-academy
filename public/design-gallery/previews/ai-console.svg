<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0c0c14"/>

  <!-- Subtle scanlines -->
  <defs>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="2" fill="rgba(0,0,0,0.04)"/>
    </pattern>
  </defs>

  <!-- Top Bar -->
  <rect width="400" height="24" fill="#1a1a2e"/>
  <line x1="0" y1="24" x2="400" y2="24" stroke="#333" stroke-width="0.5"/>
  <!-- Blinking cursor -->
  <rect x="10" y="7" width="5" height="10" fill="#00ff41" opacity="0.9"/>
  <rect x="20" y="8" width="72" height="7" rx="1" fill="#00ff41" opacity="0.7"/>
  <!-- Model select -->
  <rect x="140" y="5" width="80" height="14" rx="3" fill="rgba(0,0,0,0.3)" stroke="#333" stroke-width="0.5"/>
  <circle cx="148" cy="12" r="2.5" fill="#00ff41"/>
  <rect x="154" y="9" width="55" height="5" rx="1" fill="#7b68ee" opacity="0.7"/>
  <!-- Token counter -->
  <rect x="240" y="9" width="50" height="5" rx="1" fill="#666680" opacity="0.5"/>
  <rect x="295" y="9" width="25" height="5" rx="1" fill="#00d4ff" opacity="0.6"/>
  <!-- Status badge -->
  <rect x="350" y="6" width="36" height="12" rx="3" fill="rgba(0,255,65,0.1)"/>
  <rect x="356" y="9" width="24" height="5" rx="1" fill="#00ff41" opacity="0.6"/>

  <!-- Left Sidebar -->
  <rect x="0" y="24" width="85" height="276" fill="#101020"/>
  <line x1="85" y1="24" x2="85" y2="300" stroke="#333" stroke-width="0.5"/>
  <!-- New Session Button -->
  <rect x="6" y="32" width="73" height="16" rx="3" fill="rgba(0,255,65,0.08)" stroke="rgba(0,255,65,0.2)" stroke-width="0.5"/>
  <rect x="14" y="37" width="57" height="5" rx="1" fill="#00ff41" opacity="0.5"/>
  <!-- Date label -->
  <rect x="10" y="58" width="22" height="4" rx="1" fill="#666680" opacity="0.3"/>
  <!-- Items -->
  <rect x="6" y="66" width="73" height="14" rx="2" fill="#1a1a2e" stroke="rgba(0,255,65,0.15)" stroke-width="0.5"/>
  <rect x="12" y="70" width="58" height="5" rx="1" fill="#00ff41" opacity="0.5"/>
  <rect x="12" y="86" width="50" height="5" rx="1" fill="#666680" opacity="0.3"/>
  <rect x="12" y="98" width="55" height="5" rx="1" fill="#666680" opacity="0.3"/>
  <rect x="10" y="114" width="26" height="4" rx="1" fill="#666680" opacity="0.2"/>
  <rect x="12" y="124" width="52" height="5" rx="1" fill="#666680" opacity="0.3"/>
  <rect x="12" y="136" width="48" height="5" rx="1" fill="#666680" opacity="0.3"/>

  <!-- Chat Area -->
  <!-- User message -->
  <rect x="170" y="36" width="135" height="50" rx="5" fill="rgba(123,104,238,0.12)" stroke="rgba(123,104,238,0.2)" stroke-width="0.5"/>
  <rect x="270" y="32" width="35" height="4" rx="1" fill="#00d4ff" opacity="0.4"/>
  <rect x="178" y="44" width="120" height="5" rx="1" fill="#c8c8d4" opacity="0.6"/>
  <rect x="178" y="53" width="100" height="5" rx="1" fill="#c8c8d4" opacity="0.5"/>
  <rect x="178" y="64" width="115" height="14" rx="3" fill="rgba(0,0,0,0.4)" stroke="#333" stroke-width="0.5"/>
  <rect x="184" y="68" width="80" height="5" rx="1" fill="#00ff41" opacity="0.4"/>

  <!-- Assistant message -->
  <rect x="95" y="96" width="180" height="90" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
  <rect x="95" y="91" width="52" height="4" rx="1" fill="#00ff41" opacity="0.4"/>
  <!-- Badges -->
  <rect x="103" y="104" width="32" height="10" rx="2" fill="rgba(123,104,238,0.12)"/>
  <rect x="107" y="107" width="24" height="4" rx="1" fill="#7b68ee" opacity="0.5"/>
  <rect x="139" y="104" width="28" height="10" rx="2" fill="rgba(0,212,255,0.1)"/>
  <rect x="143" y="107" width="20" height="4" rx="1" fill="#00d4ff" opacity="0.5"/>
  <!-- Message text -->
  <rect x="103" y="120" width="164" height="5" rx="1" fill="#c8c8d4" opacity="0.5"/>
  <rect x="103" y="129" width="140" height="5" rx="1" fill="#c8c8d4" opacity="0.4"/>
  <!-- Code block -->
  <rect x="103" y="140" width="164" height="36" rx="3" fill="rgba(0,0,0,0.4)" stroke="#333" stroke-width="0.5"/>
  <rect x="109" y="146" width="80" height="4" rx="1" fill="#00ff41" opacity="0.35"/>
  <rect x="109" y="154" width="120" height="4" rx="1" fill="#7b68ee" opacity="0.3"/>
  <rect x="109" y="162" width="90" height="4" rx="1" fill="#00ff41" opacity="0.3"/>

  <!-- Typing indicator -->
  <rect x="95" y="196" width="60" height="18" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
  <circle cx="109" cy="205" r="3" fill="#00ff41" opacity="0.6"/>
  <circle cx="119" cy="205" r="3" fill="#00ff41" opacity="0.4"/>
  <circle cx="129" cy="205" r="3" fill="#00ff41" opacity="0.2"/>

  <!-- Input Area -->
  <rect x="90" y="250" width="205" height="26" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
  <rect x="100" y="258" width="100" height="5" rx="1" fill="#666680" opacity="0.25"/>
  <rect x="272" y="254" width="18" height="18" rx="3" fill="#00ff41"/>

  <!-- Right Panel -->
  <rect x="300" y="24" width="100" height="276" fill="#101020"/>
  <line x1="300" y1="24" x2="300" y2="300" stroke="#333" stroke-width="0.5"/>
  <!-- System Prompt -->
  <rect x="308" y="32" width="48" height="4" rx="1" fill="#666680" opacity="0.3"/>
  <rect x="308" y="42" width="84" height="40" rx="3" fill="rgba(0,0,0,0.3)" stroke="#333" stroke-width="0.5"/>
  <rect x="314" y="48" width="72" height="4" rx="1" fill="#c8c8d4" opacity="0.3"/>
  <rect x="314" y="56" width="60" height="4" rx="1" fill="#c8c8d4" opacity="0.25"/>
  <rect x="314" y="64" width="66" height="4" rx="1" fill="#c8c8d4" opacity="0.2"/>
  <!-- Parameters -->
  <rect x="308" y="92" width="38" height="4" rx="1" fill="#666680" opacity="0.3"/>
  <rect x="308" y="102" width="40" height="4" rx="1" fill="#666680" opacity="0.25"/>
  <rect x="368" y="102" width="20" height="4" rx="1" fill="#00d4ff" opacity="0.5"/>
  <rect x="308" y="112" width="44" height="4" rx="1" fill="#666680" opacity="0.25"/>
  <rect x="368" y="112" width="18" height="4" rx="1" fill="#00d4ff" opacity="0.5"/>
  <rect x="308" y="122" width="30" height="4" rx="1" fill="#666680" opacity="0.25"/>
  <rect x="368" y="122" width="16" height="4" rx="1" fill="#00d4ff" opacity="0.5"/>
  <!-- Response Info -->
  <rect x="308" y="140" width="50" height="4" rx="1" fill="#666680" opacity="0.3"/>
  <rect x="308" y="150" width="35" height="4" rx="1" fill="#666680" opacity="0.2"/>
  <rect x="368" y="150" width="20" height="4" rx="1" fill="#00ff41" opacity="0.5"/>
  <rect x="308" y="160" width="40" height="4" rx="1" fill="#666680" opacity="0.2"/>
  <rect x="368" y="160" width="16" height="4" rx="1" fill="#c8c8d4" opacity="0.4"/>

  <!-- Scanlines overlay -->
  <rect width="400" height="300" fill="url(#scanlines)"/>
</svg>
