<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <clipPath id="ai-clip"><rect width="400" height="300" rx="8"/></clipPath>
    <linearGradient id="ai-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#ai-clip)">
    <!-- Background -->
    <rect width="400" height="300" fill="#0F172A"/>

    <!-- Top Bar -->
    <rect width="400" height="32" fill="#0B1120"/>
    <line x1="0" y1="32" x2="400" y2="32" stroke="#1E293B" stroke-width="0.5"/>
    <!-- Logo -->
    <rect x="10" y="6" width="18" height="18" rx="4" fill="url(#ai-grad)"/>
    <text x="19" y="19" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">&lt;/&gt;</text>
    <text x="34" y="19" font-family="monospace" font-size="9" fill="#38BDF8" font-weight="700">Neural</text>
    <!-- Model Selector -->
    <rect x="80" y="8" width="90" height="16" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
    <circle cx="90" cy="16" r="3" fill="#22C55E"/>
    <text x="98" y="19" font-family="monospace" font-size="7" fill="#E5E7EB">claude-opus-4-6</text>
    <!-- Token counter -->
    <text x="330" y="19" font-family="monospace" font-size="7" fill="#64748B">tokens: </text>
    <text x="362" y="19" font-family="monospace" font-size="7" fill="#38BDF8" font-weight="600">1,247</text>

    <!-- Sidebar -->
    <rect x="0" y="32" width="100" height="268" fill="#0B1120"/>
    <line x1="100" y1="32" x2="100" y2="300" stroke="#1E293B" stroke-width="0.5"/>
    <!-- Sidebar header -->
    <text x="10" y="50" font-family="monospace" font-size="6" fill="#64748B" font-weight="600" letter-spacing="0.5">CONVERSATIONS</text>
    <!-- Active conv -->
    <rect x="4" y="56" width="92" height="22" rx="4" fill="#1E293B"/>
    <rect x="4" y="56" width="2" height="22" rx="1" fill="#38BDF8"/>
    <text x="14" y="66" font-family="monospace" font-size="6" fill="#38BDF8">&lt;/&gt;</text>
    <text x="26" y="66" font-family="monospace" font-size="5.5" fill="#E5E7EB" font-weight="500">Code Review: auth</text>
    <text x="26" y="74" font-family="monospace" font-size="4.5" fill="#64748B">Just now</text>
    <!-- Other convs -->
    <text x="14" y="92" font-family="monospace" font-size="5.5" fill="#94A3B8">Debug: memory leak</text>
    <text x="14" y="98" font-family="monospace" font-size="4.5" fill="#64748B">2 hours ago</text>
    <text x="14" y="114" font-family="monospace" font-size="5.5" fill="#94A3B8">SQL optimization</text>
    <text x="14" y="120" font-family="monospace" font-size="4.5" fill="#64748B">Yesterday</text>
    <text x="14" y="136" font-family="monospace" font-size="5.5" fill="#94A3B8">API design</text>
    <text x="14" y="142" font-family="monospace" font-size="4.5" fill="#64748B">Mar 9</text>
    <text x="14" y="158" font-family="monospace" font-size="5.5" fill="#94A3B8">Docker compose</text>
    <text x="14" y="164" font-family="monospace" font-size="4.5" fill="#64748B">Mar 8</text>

    <!-- Chat Area -->
    <!-- System message -->
    <rect x="110" y="42" width="280" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,2"/>
    <rect x="118" y="47" width="18" height="14" rx="3" fill="#334155"/>
    <text x="127" y="57" font-family="monospace" font-size="5.5" fill="#64748B" text-anchor="middle">SYS</text>
    <text x="142" y="54" font-family="monospace" font-size="5" fill="#64748B" font-style="italic">You are a senior software engineer...</text>
    <text x="142" y="63" font-family="monospace" font-size="5" fill="#64748B" font-style="italic">Review code for correctness, performance, security.</text>

    <!-- User message -->
    <rect x="118" y="80" width="18" height="14" rx="3" fill="#38BDF8"/>
    <text x="127" y="90" font-family="monospace" font-size="5.5" fill="#0F172A" text-anchor="middle" font-weight="700">AK</text>
    <text x="142" y="86" font-family="monospace" font-size="5" fill="#38BDF8" font-weight="700">You</text>
    <text x="162" y="86" font-family="monospace" font-size="4.5" fill="#64748B">11:42 AM</text>
    <rect x="142" y="90" width="236" height="48" rx="6" fill="#334155"/>
    <text x="150" y="102" font-family="monospace" font-size="5.5" fill="#E5E7EB">Can you review this auth handler?</text>
    <!-- Code block inside user msg -->
    <rect x="150" y="108" width="220" height="24" rx="4" fill="#0B1120" stroke="#1E293B" stroke-width="0.5"/>
    <rect x="150" y="108" width="220" height="8" rx="4" fill="rgba(0,0,0,0.3)"/>
    <text x="156" y="114" font-family="monospace" font-size="4.5" fill="#64748B">typescript</text>
    <text x="156" y="124" font-family="monospace" font-size="5" fill="#C084FC">async function</text>
    <text x="206" y="124" font-family="monospace" font-size="5" fill="#38BDF8">verifyToken</text>
    <text x="250" y="124" font-family="monospace" font-size="5" fill="#64748B">(token, expected)</text>

    <!-- Assistant message -->
    <rect x="118" y="148" width="18" height="14" rx="3" fill="url(#ai-grad)"/>
    <text x="127" y="158" font-family="monospace" font-size="5.5" fill="#fff" text-anchor="middle" font-weight="700">AI</text>
    <text x="142" y="154" font-family="monospace" font-size="5" fill="#A78BFA" font-weight="700">claude-opus-4-6</text>
    <text x="210" y="154" font-family="monospace" font-size="4.5" fill="#64748B">11:42 AM</text>
    <rect x="142" y="158" width="248" height="96" rx="6" fill="#1E293B" stroke="#1E293B" stroke-width="0.5"/>
    <text x="150" y="170" font-family="monospace" font-size="5.5" fill="#E5E7EB">Good catch. This is vulnerable to a timing</text>
    <text x="150" y="179" font-family="monospace" font-size="5.5" fill="#E5E7EB">attack. Use crypto.timingSafeEqual instead:</text>
    <!-- Code block -->
    <rect x="150" y="186" width="232" height="38" rx="4" fill="#0B1120" stroke="#1E293B" stroke-width="0.5"/>
    <rect x="150" y="186" width="232" height="9" rx="4" fill="rgba(0,0,0,0.3)"/>
    <text x="156" y="193" font-family="monospace" font-size="4.5" fill="#64748B">typescript</text>
    <text x="375" y="193" font-family="monospace" font-size="4.5" fill="#64748B" text-anchor="end">Copy</text>
    <text x="156" y="203" font-family="monospace" font-size="5" fill="#C084FC">import</text>
    <text x="177" y="203" font-family="monospace" font-size="5" fill="#E5E7EB">{ </text>
    <text x="186" y="203" font-family="monospace" font-size="5" fill="#38BDF8">timingSafeEqual</text>
    <text x="252" y="203" font-family="monospace" font-size="5" fill="#E5E7EB"> } </text>
    <text x="262" y="203" font-family="monospace" font-size="5" fill="#C084FC">from</text>
    <text x="280" y="203" font-family="monospace" font-size="5" fill="#86EFAC">'crypto'</text>
    <text x="156" y="213" font-family="monospace" font-size="5" fill="#C084FC">const</text>
    <text x="174" y="213" font-family="monospace" font-size="5" fill="#E5E7EB">a = Buffer.</text>
    <text x="218" y="213" font-family="monospace" font-size="5" fill="#38BDF8">from</text>
    <text x="234" y="213" font-family="monospace" font-size="5" fill="#E5E7EB">(token);</text>

    <text x="150" y="244" font-family="monospace" font-size="5.5" fill="#E5E7EB">Also add rate limiting and consider</text>
    <text x="150" y="252" font-family="monospace" font-size="5.5" fill="#E5E7EB">using a tested auth library like jose.</text>

    <!-- Typing indicator -->
    <rect x="142" y="262" width="50" height="16" rx="6" fill="#1E293B" stroke="#1E293B" stroke-width="0.5"/>
    <circle cx="155" cy="270" r="2.5" fill="#64748B" opacity="0.4"/>
    <circle cx="164" cy="270" r="2.5" fill="#64748B" opacity="0.7"/>
    <circle cx="173" cy="270" r="2.5" fill="#64748B" opacity="1"/>

    <!-- Input Area -->
    <rect x="110" y="282" width="280" height="18" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
    <text x="120" y="294" font-family="monospace" font-size="6" fill="#64748B">Type a message...</text>
    <rect x="370" y="284" width="14" height="14" rx="4" fill="#38BDF8"/>
    <text x="377" y="294" font-family="monospace" font-size="7" fill="#0F172A" text-anchor="middle">&#x25B6;</text>
  </g>
</svg>
