<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Gallery — Claude Academy</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #2a2a35;
            --text: #e8e8ed;
            --text-secondary: #8b8b9e;
            --accent: #7c5cfc;
            --accent-hover: #9178ff;
            --success: #00d97e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh;
        }

        .header {
            border-bottom: 1px solid var(--border); padding: 0 48px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: rgba(10,10,15,0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #00d97e);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: #fff;
        }
        .header-title { font-size: 15px; font-weight: 600; }
        .header-badge { font-size: 11px; padding: 3px 8px; background: rgba(124,92,252,0.15); color: var(--accent); border-radius: 20px; }
        .header-link { color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
        .header-link:hover { color: var(--text); }

        .hero { text-align: center; padding: 80px 48px 48px; max-width: 720px; margin: 0 auto; }
        .hero h1 {
            font-size: 40px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 16px;
            background: linear-gradient(135deg, #e8e8ed, #8b8b9e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero p { font-size: 17px; color: var(--text-secondary); line-height: 1.6; max-width: 560px; margin: 0 auto; }

        .filter-bar { display: flex; justify-content: center; gap: 8px; padding: 0 48px 48px; flex-wrap: wrap; }
        .filter-btn {
            padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .gallery {
            max-width: 1320px; margin: 0 auto; padding: 0 48px 96px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px;
        }

        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            overflow: hidden; transition: all 0.25s ease; display: flex; flex-direction: column;
        }
        .card:hover { border-color: rgba(124,92,252,0.4); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

        .card-preview {
            position: relative; aspect-ratio: 16 / 10; overflow: hidden;
            border-bottom: 1px solid var(--border);
        }
        .card-preview:hover .mockup { transform: scale(1.05); }
        .card-tag {
            position: absolute; top: 8px; right: 8px; padding: 3px 8px;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
            border-radius: 5px; font-size: 10px; font-weight: 500; color: #fff; z-index: 2;
        }
        .mockup {
            width: 100%; height: 100%; font-size: 6px; overflow: hidden;
            pointer-events: none; user-select: none; transition: transform 0.4s ease;
        }
        .mockup * { margin: 0; padding: 0; box-sizing: border-box; }

        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
        .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
        .card-best-for {
            font-size: 11px; display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; width: fit-content;
            background: rgba(124,92,252,0.08); color: var(--accent); border: 1px solid rgba(124,92,252,0.15);
        }
        .card-colors { display: flex; gap: 6px; margin-bottom: 16px; }
        .color-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); }
        .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }

        .btn {
            padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
            font-family: inherit; cursor: pointer; transition: all 0.2s; text-decoration: none;
            text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 5px; border: none;
        }
        .btn-primary { background: var(--accent); color: #fff; flex: 1; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: rgba(124,92,252,0.1); color: var(--accent); border: 1px solid rgba(124,92,252,0.15); }
        .btn-secondary:hover { background: rgba(124,92,252,0.18); }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); border-color: rgba(124,92,252,0.3); }
        .btn-icon { width: 14px; height: 14px; }

        .toast {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--success); color: #000; padding: 12px 24px; border-radius: 10px;
            font-size: 14px; font-weight: 600; pointer-events: none; opacity: 0; transition: all 0.3s ease; z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .header { padding: 0 20px; }
            .hero { padding: 48px 20px 32px; }
            .hero h1 { font-size: 28px; }
            .filter-bar { padding: 0 20px 32px; }
            .gallery { padding: 0 20px 64px; grid-template-columns: 1fr; gap: 16px; }
            .header-right { display: none; }
        }
    </style>
</head>

const gallery = document.getElementById('gallery');
const toast = document.getElementById('toast');

function renderCards(filter = 'all') {
    const filtered = filter === 'all' ? designs : designs.filter(d => d.tag === filter);
    gallery.innerHTML = filtered.map(d => `
        <div class="card" data-tag="${d.tag}">
            <div class="card-preview">
                <div class="mockup">${d.mockup}</div>
                <span class="card-tag">${d.tag}</span>
            </div>
            <div class="card-body">
                <div class="card-title">${d.title}</div>
                <div class="card-desc">${d.desc}</div>
                <div class="card-best-for">Best for: ${d.bestFor}</div>
                <div class="card-colors">
                    ${d.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join('')}
                </div>
                <div class="card-actions">
                    <a href="demos/${d.id}.html" target="_blank" class="btn btn-primary">
                        <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M6 6l4 2-4 2z" fill="currentColor" stroke="none"/></svg>
                        Open Demo
                    </a>
                    <button class="btn btn-secondary" onclick="copySkill('${d.id}')">Copy Skill</button>
                    <button class="btn btn-ghost" onclick="viewTokens('${d.id}')">Tokens</button>
                </div>
            </div>
        </div>
    `).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards(btn.dataset.filter);
    });
});

async function copySkill(id) {
    try {
        const res = await fetch('skills/' + id + '.md');
        const text = await res.text();
        await navigator.clipboard.writeText(text);
        showToast('Skill prompt copied');
    } catch (e) {
        try {
            const res = await fetch('skills/' + id + '.md');
            const text = await res.text();
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta); ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('Skill prompt copied');
        } catch (err) { showToast('Failed to copy'); }
    }
}

async function viewTokens(id) {
    try {
        const res = await fetch('styles/' + id + '.css');
        const text = await res.text();
        const root = text.match(/:root\s*\{([^}]+)\}/);
        if (root) {
            await navigator.clipboard.writeText(':root {' + root[1] + '}');
            showToast('Design tokens copied');
        }
    } catch (e) { showToast('Failed to copy tokens'); }
}

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

renderCards();
