<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Gallery — Claude Academy</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-hover: #1a1a24;
            --border: #2a2a35;
            --text: #e8e8ed;
            --text-secondary: #8b8b9e;
            --accent: #7c5cfc;
            --accent-hover: #9178ff;
            --success: #00d97e;
            --radius: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 0 48px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #00d97e);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-badge {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(124, 92, 252, 0.15);
            color: var(--accent);
            border-radius: 20px;
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-link:hover {
            color: var(--text);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 80px 48px 48px;
            max-width: 720px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #e8e8ed 0%, #8b8b9e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 17px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 520px;
            margin: 0 auto;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 0 48px 48px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Grid */
        .gallery {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 48px 96px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: rgba(124, 92, 252, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-preview {
            position: relative;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            background: #0e0e14;
            border-bottom: 1px solid var(--border);
        }

        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-preview img {
            transform: scale(1.03);
        }

        .card-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.02em;
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
            flex: 1;
        }

        .card-colors {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--border);
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: rgba(124, 92, 252, 0.1);
            color: var(--accent);
            border: 1px solid rgba(124, 92, 252, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(124, 92, 252, 0.18);
        }

        .btn-icon {
            width: 16px;
            height: 16px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--success);
            color: #000;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 20px;
            }

            .hero {
                padding: 48px 20px 32px;
            }

            .hero h1 {
                font-size: 28px;
            }

            .hero p {
                font-size: 15px;
            }

            .filter-bar {
                padding: 0 20px 32px;
            }

            .gallery {
                padding: 0 20px 64px;
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .header-right {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="logo">D</div>
            <span class="header-title">Design Gallery</span>
            <span class="header-badge">12 systems</span>
        </div>
        <div class="header-right">
            <a href="#" class="header-link">Claude Academy</a>
        </div>
    </header>

    <section class="hero">
        <h1>UI Design Systems</h1>
        <p>A curated collection of 12 production-ready design systems. Preview live demos and copy skill prompts to use them in your projects.</p>
    </section>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="minimal">Minimal</button>
        <button class="filter-btn" data-filter="dark">Dark</button>
        <button class="filter-btn" data-filter="dashboard">Dashboard</button>
        <button class="filter-btn" data-filter="creative">Creative</button>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="toast" id="toast">Skill prompt copied to clipboard</div>

    <script>
        const designs = [
            {
                id: 'apple-minimal',
                title: 'Apple Minimal',
                desc: 'Extreme whitespace, clean hierarchy, subtle elevation. SF Pro style typography with large headings.',
                tag: 'minimal',
                colors: ['#F5F5F7', '#1D1D1F', '#0071E3', '#FFFFFF']
            },
            {
                id: 'stripe-saas',
                title: 'Stripe SaaS',
                desc: 'Professional SaaS dashboard with structured layout and floating white cards on dark navy.',
                tag: 'dark',
                colors: ['#0B1A2B', '#635BFF', '#0A2540', '#FFFFFF']
            },
            {
                id: 'linear-dark',
                title: 'Linear Dark',
                desc: 'Ultra clean dark UI with minimal borders, subtle transitions, and compact layout.',
                tag: 'dark',
                colors: ['#0D0D0D', '#151515', '#7C3AED', '#FFFFFF']
            },
            {
                id: 'vercel-minimal',
                title: 'Vercel Minimal',
                desc: 'Maximum contrast developer aesthetic with clean layout and monospace code blocks.',
                tag: 'minimal',
                colors: ['#FFFFFF', '#000000', '#111111', '#EAEAEA']
            },
            {
                id: 'notion-clean',
                title: 'Notion Clean',
                desc: 'Document style interface with serif headings, content blocks, and soft borders.',
                tag: 'minimal',
                colors: ['#FFFFFF', '#2F3437', '#E6E6E6', '#F7F6F3']
            },
            {
                id: 'cyber-neon',
                title: 'Cyber Neon',
                desc: 'Futuristic HUD interface with glowing neon elements, angular components, and scanlines.',
                tag: 'creative',
                colors: ['#0A0A0A', '#00FFC8', '#FF00FF', '#00A2FF']
            },
            {
                id: 'glassmorphism',
                title: 'Glassmorphism',
                desc: 'Frosted glass layers with blur backgrounds and transparent surfaces on vibrant gradients.',
                tag: 'creative',
                colors: ['#667eea', '#764ba2', '#FFFFFF', '#9F7AEA']
            },
            {
                id: 'material-modern',
                title: 'Material Modern',
                desc: 'Material Design 3 with vibrant accents, clear elevation system, and pill-shaped buttons.',
                tag: 'minimal',
                colors: ['#F8F9FA', '#6200EE', '#03DAC6', '#FFFFFF']
            },
            {
                id: 'fintech-dashboard',
                title: 'Fintech Dashboard',
                desc: 'Data focused UI with clear metrics, KPI cards, charts, and transaction tables.',
                tag: 'dashboard',
                colors: ['#F1F5F9', '#0EA5E9', '#22C55E', '#EF4444']
            },
            {
                id: 'fitness-dashboard',
                title: 'Fitness Dashboard',
                desc: 'Energetic visuals with large statistics, progress rings, and performance metrics.',
                tag: 'dashboard',
                colors: ['#111827', '#F97316', '#22C55E', '#1F2937']
            },
            {
                id: 'ai-console',
                title: 'AI Console',
                desc: 'Terminal inspired chat interface with developer focus, code blocks, and console panels.',
                tag: 'dark',
                colors: ['#0F172A', '#38BDF8', '#1E293B', '#E5E7EB']
            },
            {
                id: 'developer-terminal',
                title: 'Developer Terminal',
                desc: 'IDE inspired layout with file explorer, syntax highlighting, terminal, and status bar.',
                tag: 'dark',
                colors: ['#0B0F19', '#3B82F6', '#569CD6', '#4EC9B0']
            }
        ];

        const gallery = document.getElementById('gallery');
        const toast = document.getElementById('toast');

        function renderCards(filter = 'all') {
            const filtered = filter === 'all' ? designs : designs.filter(d => d.tag === filter);
            gallery.innerHTML = filtered.map(d => `
                <div class="card" data-tag="${d.tag}">
                    <div class="card-preview">
                        <img src="previews/${d.id}.svg" alt="${d.title}" loading="lazy">
                        <span class="card-tag">${d.tag}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${d.title}</div>
                        <div class="card-desc">${d.desc}</div>
                        <div class="card-colors">
                            ${d.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join('')}
                        </div>
                        <div class="card-actions">
                            <a href="demos/${d.id}.html" target="_blank" class="btn btn-primary">
                                <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="2" y="2" width="12" height="12" rx="2"/>
                                    <path d="M6 6l4 2-4 2z" fill="currentColor" stroke="none"/>
                                </svg>
                                Open Demo
                            </a>
                            <button class="btn btn-secondary" onclick="copySkill('${d.id}')">
                                <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="4" y="4" width="10" height="10" rx="1.5"/>
                                    <path d="M12 4V3a1.5 1.5 0 00-1.5-1.5H3A1.5 1.5 0 001.5 3v7.5A1.5 1.5 0 003 12h1"/>
                                </svg>
                                Copy Skill
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCards(btn.dataset.filter);
            });
        });

        // Copy skill prompt
        async function copySkill(id) {
            try {
                const res = await fetch(`skills/${id}.md`);
                const text = await res.text();
                await navigator.clipboard.writeText(text);
                showToast('Skill prompt copied to clipboard');
            } catch (e) {
                // Fallback for non-HTTPS
                try {
                    const res = await fetch(`skills/${id}.md`);
                    const text = await res.text();
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast('Skill prompt copied to clipboard');
                } catch (err) {
                    showToast('Failed to copy — open the skill file manually');
                }
            }
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Initial render
        renderCards();
    </script>

</body>
</html>
