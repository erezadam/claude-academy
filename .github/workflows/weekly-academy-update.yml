name: weekly-academy-update

on:
  schedule:
    # 06:17 UTC ולא 06:00 — תחילת שעה עגולה היא ה-slot העמוס ביותר ב-GitHub Actions,
    # שבו ריצות schedule מתעכבות או נשמטות. דקה לא-עגולה מקטינה את הסיכון.
    - cron: "17 6 * * SAT"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            קרא את הקובץ .claude/academy-update-spec.md ובצע אותו במלואו.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools Read,Write,Edit,Bash,Glob,Grep,WebFetch
